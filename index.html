<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Share Bookmarks</title>
    
    <script type="module" src="script.js"></script>
    <style>
      .bookmark{
        display: flex;
        gap: 2rem;
      }
    </style>

  </head>
  <body><main>
    <section>
      <label for="select-user">Select user</label>
      <select name="select-user" id="select-user"></select>
      <div class="bookmarks-list">
      
      </div>
    </section>
    <section class="form">
      <fieldset>
        <legend>Add bookmark</legend>
      <form action="#">
      
      <label for="title">Title: </label>
      <input type="text" name="title" id="title" required />
      <label for="url">URL: </label><input type="url" name="url" id="url" required />
      <label for="description">Description: </label><input type="text" name="description" id="description" required />
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
      </fieldset></section>
    <section>
      <button type="button" id="clear">Clear</button>
    </section></main>
  </body>
</html>
